version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  PDF Highlight Extractor — self-hosted deployment
#
#  Quick start:
#    docker compose up
#    Open http://localhost:3000
# ─────────────────────────────────────────────────────────────────

services:

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      - UPLOAD_DIR=/tmp/pdf_highlights_uploads
      - MAX_UPLOAD_BYTES=104857600
      - UPLOAD_TTL_SECONDS=3600
    volumes:
      - uploads:/tmp/pdf_highlights_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  uploads:
